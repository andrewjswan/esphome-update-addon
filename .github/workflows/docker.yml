name: ESPHome Update / Docker

on:
  workflow_call:
  workflow_dispatch:

env:
  IMAGE_NAME: esphome-update-addon

jobs:
  init:
    name: Addon / Init
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.yaml.outputs.version }}
      architectures: ${{ steps.info.outputs.architectures }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    permissions:
      contents: read
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6

      - name: Get Version from Config
        uses: christian-ci/action-yaml-github-output@v2
        id: yaml
        with:
          file_path: ${{ github.workspace }}/esphome-update/config.yaml

      - name: Get Addon Information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./esphome-update"

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ fromJson(steps.info.outputs.architectures) }}
          image-name: ${{ env.IMAGE_NAME }}

  docker:
    name: Docker / Build ${{ matrix.arch }}
    needs:
      - init
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6

      - name: Build Test Image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
          push: "true"
          version: ${{ needs.init.outputs.version }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}

  manifest:
    name: Publish multi-arch manifest
    needs:
      - init
      - docker
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ fromJson(needs.init.outputs.architectures) }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
